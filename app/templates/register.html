<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com/3.4.16"></script>
    <title>Register</title>
  </head>
  <body>
    <h2>Enter username and password to create a new account</h2>
    <form method="post">
      <label for="username">Username:</label>
      <br>
      <input type="text" name="username" id="username">
      <br>
      <br>
      <label for="password">Password:</label>
      <br>
      <input type="password" name="password" id="password">
      <br>
      <br>
      <input type="submit" value="Register">
    </form>
    {% if error %}
      <h3>{{ error }}</h3>
    {% endif %}
    <!-- add line 26 fr                  om carrots repo (jason's p0 register page) -->


    <!-- Allows users to continue as guest. -->
    <button class="buttons" onclick= "document.location='/home'">Continue as Guest</button>

  </body>
</html>
